<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario</title>

    <link rel="stylesheet" th:href="@{/satic/estilos.css}">
</head>
   <script th:src="@{/js/scripts.js}"></script>
<body>

<h1 th:text="${accion} + ' producto'"></h1>

<form th:action="@{/productos/guardar}" th:object="${producto}" method="post">

    <input type="hidden" th:field="*{id}">

    <label>Nombre</label>
    <input type="text" th:field="*{nombre}">

    <label>Descripción</label>
    <input type="text" th:field="*{descripcion}">

    <label>Precio</label>
    <input type="number" th:field="*{precio}" step="0.01">

    <button type="submit">Guardar</button>
</form>

<br>

<a th:href="@{/productos}">Volver</a>

</body>
</html>
