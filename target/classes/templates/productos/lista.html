<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>
    <link rel="stylesheet" th:href="@{/static/estilos.css}">
</head>
<script th:src="@{/js/scripts.js}"></script>
<body>

<h1>Lista de productos</h1>

<a th:href="@{/productos/nuevo}">Nuevo producto</a>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Precio</th>
        <th>Acciones</th>
    </tr>

    <tr th:each="p : ${productos}">
        <td th:text="${p.id}"></td>
        <td th:text="${p.nombre}"></td>
        <td th:text="${p.descripcion}"></td>
        <td th:text="${p.precio}"></td>
        <td>
            <a th:href="@{/productos/editar/{id}(id=${p.id})}">Editar</a>
            <a th:href="@{/productos/eliminar/{id}(id=${p.id})}">Eliminar</a>
        </td>
    </tr>
</table>

</body>
</html>
